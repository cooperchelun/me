<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>職涯測驗結果</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
    <nav class="bg-indigo-600 p-4 text-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <span class="text-xl font-bold">MIS 職涯專案</span>
            <div class="space-x-4">
                <a href="index.html" class="hover:text-indigo-200">關於我</a>
                <a href="RSC.html" class="hover:text-indigo-200 border-b-2 border-white">測驗結果</a>
                <a href="mis.html" class="hover:text-indigo-200">目標職缺</a>
                <a href="introduce.html" class="hover:text-indigo-200">自傳履歷</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto py-12 px-4">
        <h2 class="text-3xl font-bold text-center mb-8">104 何倫碼測驗分析</h2>
        <div class="grid md:grid-cols-2 gap-8 items-center max-w-5xl mx-auto">
            <div class="bg-white p-6 rounded-xl shadow-lg">
                <h3 class="text-xl font-bold text-indigo-600 mb-4 text-center">我的興趣代碼：RIC</h3>
                <div class="space-y-4">
                    <div>
                        <div class="flex justify-between mb-1"><span>R 實際型 (Realistic)</span><span>85%</span></div>
                        <div class="w-full bg-gray-200 rounded-full h-2.5"><div class="bg-blue-600 h-2.5 rounded-full" style="width: 85%"></div></div>
                    </div>
                    <div>
                        <div class="flex justify-between mb-1"><span>I 研究型 (Investigative)</span><span>70%</span></div>
                        <div class="w-full bg-gray-200 rounded-full h-2.5"><div class="bg-green-600 h-2.5 rounded-full" style="width: 70%"></div></div>
                    </div>
                    <div>
                        <div class="flex justify-between mb-1"><span>C 常規型 (Conventional)</span><span>90%</span></div>
                        <div class="w-full bg-gray-200 rounded-full h-2.5"><div class="bg-yellow-500 h-2.5 rounded-full" style="width: 90%"></div></div>
                    </div>
                </div>
            </div>
            <div class="text-gray-700 space-y-4">
                <p class="font-bold text-lg">分析說明：</p>
                <p>根據測驗結果，我展現出強烈的「常規型」與「實際型」特質。這代表我對於規律、流程清晰的工作環境感到自在，並喜歡動手操作技術工具。</p>
                <div class="p-4 border-l-4 border-green-500 bg-green-50 italic">
                    「RIC 的組合非常符合 MIS 工程師的特質：需要研究新技術(I)，且必須嚴謹遵循系統規範(C)，並實際處理硬體與伺服器問題(R)。」
                </div>
            </div>
        </div>
    </main>
</body>
</html>
