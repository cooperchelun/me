<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人職涯導航 - 測驗結果</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans">
    <nav class="bg-indigo-700 text-white p-4 sticky top-0 z-50 shadow-md">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <span class="font-bold text-xl">My MIS Career</span>
            <div class="space-x-4 text-sm md:text-base">
                <a href="index.html" class="underline">測驗結果</a>
                <a href="job.html" class="hover:text-indigo-200">目標職缺</a>
                <a href="resume.html" class="hover:text-indigo-200">自傳履歷</a>
                <a href="plan.html" class="hover:text-indigo-200">未來規劃</a>
            </div>
        </div>
    </nav>

    <header class="py-16 bg-white text-center border-b">
        <h1 class="text-4xl font-extrabold text-slate-800">職涯興趣測驗結果</h1>
        <p class="text-slate-500 mt-4 text-lg">探索自我，找尋資訊管理的核心職能</p>
    </header>

    <section class="max-w-4xl mx-auto py-12 px-6">
        <div class="grid md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 text-center">
                <div class="text-3xl mb-2">🛠️</div>
                <h2 class="text-xl font-bold text-indigo-600">R 實作型</h2>
                <p class="text-gray-600 mt-2">喜歡排除硬體故障、維護伺服器與網路佈線。</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 text-center">
                <div class="text-3xl mb-2">🔍</div>
                <h2 class="text-xl font-bold text-indigo-600">I 研究型</h2>
                <p class="text-gray-600 mt-2">擅長邏輯分析，診斷系統異常並優化自動化腳本。</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 text-center">
                <div class="text-3xl mb-2">📋</div>
                <h2 class="text-xl font-bold text-indigo-600">C 常規型</h2>
                <p class="text-gray-600 mt-2">對資料備份、系統稽核與資安 SOP 具備高度嚴謹性。</p>
            </div>
        </div>
    </section>
</body>
</html>
